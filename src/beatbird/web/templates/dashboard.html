{% extends "base.html" %}
{% block subtitle %}Dashboard{% endblock %}

{% block content %}
<!-- Now Playing — partial renders its own <article id="now-playing">
     with the hx-* attributes that handle 2-second auto-refresh. Same
     partial is returned by /ui/now-playing for the htmx swap. -->
{% include "_now_playing.html" %}

<!-- Volume — separate fragment so dragging the slider doesn't fight the
     2-second status poll. The slider posts on input (debounced inside
     htmx via hx-trigger="input changed delay:150ms") and we update the
     label client-side via hx-on::after-request — saves a server round-
     trip just to render the percentage text. -->
<article id="volume-card">
  <header style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.4rem">
    <strong>Lautstärke</strong>
    <span class="num" id="vol-pct">{{ status.volume }}%</span>
  </header>
  <input type="range" min="0" max="100" value="{{ status.volume }}"
         name="pct" id="vol-slider"
         hx-post="/ui/vol"
         hx-trigger="input changed delay:150ms"
         hx-swap="none"
         hx-on::after-request="document.getElementById('vol-pct').textContent = this.value + '%'">
</article>

<script>
  // Keep the slider in sync with the speaker — turning the knob on the
  // display (or another phone) should move it here too. The catch is not
  // stomping a live drag: skip the sync for 1.5 s after the last touch and
  // never while the user is holding the thumb. Polls the cheap /api/volume,
  // not the full status snapshot.
  (function () {
    var slider = document.getElementById('vol-slider');
    var label = document.getElementById('vol-pct');
    if (!slider) return;
    var lastTouch = 0;
    var GUARD_MS = 1500;
    slider.addEventListener('input', function () { lastTouch = Date.now(); });
    setInterval(function () {
      if (Date.now() - lastTouch < GUARD_MS) return;
      fetch('/api/volume').then(function (r) { return r.json(); }).then(function (s) {
        if (typeof s.pct !== 'number') return;
        if (Date.now() - lastTouch < GUARD_MS) return;     // re-check after await
        if (document.activeElement === slider) return;      // thumb held
        if (parseInt(slider.value, 10) !== s.pct) {
          slider.value = s.pct;
          label.textContent = s.pct + '%';
        }
      }).catch(function () {});
    }, 2500);
  })();
</script>

<!-- Bluetooth — pair button + connected device + paired-devices list.
     Pair-now posts to a UI endpoint that opens a 60 s discoverable
     window. The card auto-refreshes every 4 s so the discoverable
     countdown + connection state stay live. -->
{% include "_bluetooth.html" %}
{% endblock %}
