# Zipp Mini 2 (LTH200)
# Pi Zero 2W · Innomaker AMP Pro Mini Hat (MA12070P) · Waveshare AMOLED 1.43
# 2.0-way: 3" Orchid broadband + 1" Daisy tweeter, 3.5 kHz L-R crossover in DSP

identity:
  hostname: zippmini2
  friendly_name: "Zipp Mini 2"
  speaker_id: zipp_mini_2

platform: pi-zero-2w

soundcard:
  driver: louder-hat-plus-1x


audio:
  camilladsp_config: zipp-mini-2   # config/camilladsp/zipp-mini-2.yml
  sample_rate: 48000
  format: S32_LE
  volume:
    min_db: -60
    max_db: -10
    # Sonos-style audio taper. With gamma=2.0 a 50%-slider gives ~50%-perceived
    # loudness (instead of ~6%). Set to 1.0 to revert to linear dB mapping.
    curve_gamma: 2.0
  loudness:
    enabled: true
    # Aggressive loudness compensation: bass driver gets boosted to near-max
    # in the lower volume range so it can already deliver fullness at quiet
    # levels. As volume rises, the boost backs off to protect Xmax and avoid
    # midrange masking. Curve = cubic-smoothstep, plateau 0..10%, decay to 75%.
    curve: smoothstep
    filters:
      - {name: bass_shelf,   max_boost_db: 6.0}
      - {name: timpani_body, max_boost_db: 3.0}
  # Idle power save: after 10 min quiet, drop the TAS amp into I2C deep-sleep
  # (measured 4 W → 2 W on this Louder Hat Plus 1X). Woken on play/touch/volume.
  amp_deep_sleep:
    enabled: true
    timeout_s: 600

display:
  type: amoled
  variant: waveshare-1.43
  serial_device: auto
  # Petrol/cream enclosure → warm gold accent (Teal+Gold complement). The
  # five extended slots are the firmware theme.h defaults (cream/linen/rust),
  # pinned explicitly so display + web UI read identically. Drives both the
  # AMOLED (PAL:) and the web UI theme().
  accent_color:   "E8C07D"   # champagne gold, a touch warmer than the F0CB7B default
  accent_glow:    "FFE6B3"   # brighter champagne
  accent_dim:     "3C321E"   # ~25% accent on black
  text_primary:   "F4EFE0"   # cream
  text_secondary: "A89E89"   # linen
  accent_alert:   "C73E2C"   # rust
  spectrum_bands: 0      # FFT capture conflicts with CamillaDSP on ALSA Loopback subs; firmware uses LV:-driven energy ring instead
  cover_background:
    enabled: false       # album cover abandoned — animating it judders on the S3 (no 2D GPU), static competed with the title scroll. Clean profile-themed UI instead. HT: transport stays dormant if we revisit.

hardware:
  power_button:
    enabled: false       # parked: GPIO17 wiring tried but didn't trigger — rework when the case has to come off for another reason anyway
    gpio: 17
    long_press_s: 2.0

wifi:
  ssid: "your-ssid"
  country: DE
  use_usb_dongle: true
  disable_onboard_radio: true
  # Zipp Mini 2 is in a plastic case, so onboard BT comes through fine —
  # no Faraday cage like on the metal Beat. Keep the onboard chip live
  # so /bluetooth in the web UI can drive pairing.
  disable_bluetooth: false

mqtt:
  enabled: true
  # host + user are LAN/deployment-specific — real values come from
  # secrets/mqtt.host + secrets/mqtt.user (out of this public repo) and
  # override these placeholders at install time. See install/00-base.sh.
  host: mqtt.local
  port: 1883
  user: beatbird
  discovery_prefix: homeassistant
  base_topic: beatbird/zipp-mini-2

sources:
  spotify:
    enabled: true
    device_name: "Zipp Mini 2"
    bitrate: 320
    normalisation: true
  bluetooth: {enabled: true, a2dp: true}
  toslink:   {enabled: false}
  snapcast:
    # See beat-1.yml for the bridge's source-indicator behaviour. Real
    # server IP comes from BEATBIRD_SNAPCAST_SERVER (secrets/snapcast.host).
    enabled: true
    server: 192.168.1.10
    latency_ms: 30

# Weather — coords live in secrets/location.coords (gitignored).
weather:
  enabled: true
  interval_minutes: 30

web:
  enabled: true
  port: 8080

# Standby idle-text source. Local list is always available; RSS headlines
# mixed in if a feed is configured. Empty rss_url = local only. The local
# airport-board lines are the eye-catcher the standby screen is built
# around — actual news headlines competed with the weather block for the
# "informative" slot and lost. RSS stays off by default; the /settings
# web UI is the place to opt back in if you want it.
idle:
  rss_url: ""
  rss_refresh_minutes: 30
  max_chars: 50                  # marquee scrolls anything over visible width
  rss_weight: 0.5                # 50/50 mix between RSS + local pool (when RSS on)
