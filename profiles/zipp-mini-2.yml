# Zipp Mini 2 (LTH200)
# Pi Zero 2W · Innomaker AMP Pro Mini Hat (MA12070P) · Waveshare AMOLED 1.43
# 2.0-way: 3" Orchid broadband + 1" Daisy tweeter, 3.5 kHz L-R crossover in DSP

identity:
  hostname: zippmini2
  friendly_name: "Zipp Mini 2"
  speaker_id: zipp_mini_2

platform: pi-zero-2w

soundcard:
  driver: louder-hat-plus-1x


audio:
  camilladsp_config: zipp-mini-2   # config/camilladsp/zipp-mini-2.yml
  sample_rate: 48000
  format: S32_LE
  volume:
    min_db: -60
    max_db: -10
  loudness:
    enabled: true
    filters:
      - {name: bass_shelf,   max_boost_db: 3.0}
      - {name: timpani_body, max_boost_db: 1.5}

display:
  type: amoled
  variant: waveshare-1.43
  serial_device: auto
  spectrum_bands: 0      # FFT capture conflicts with CamillaDSP on ALSA Loopback subs; firmware uses LV:-driven energy ring instead

hardware:
  power_button:
    enabled: true
    gpio: 3              # GPIO3 = Pin 5. BCM hardware wakes the Pi from halt when pulled low — same button shuts down AND turns on.
    long_press_s: 2.0    # hold this long to actually power off (short press is a no-op)

wifi:
  ssid: "your-ssid"
  country: DE
  use_usb_dongle: true
  disable_onboard_radio: true
  disable_bluetooth: true

mqtt:
  enabled: true
  host: 192.168.1.10
  port: 1883
  user: beatbird
  discovery_prefix: homeassistant
  base_topic: beatbird/zipp-mini-2

sources:
  spotify:
    enabled: true
    device_name: "Zipp Mini 2"
    bitrate: 320
    normalisation: true
  bluetooth: {enabled: false, a2dp: true}
  toslink:   {enabled: false}
  snapcast:  {enabled: false, server: 192.168.1.10, latency_ms: 30}

web:
  enabled: true
  port: 8080
