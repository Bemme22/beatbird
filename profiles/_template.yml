# ─────────────────────────────────────────────────────────────────────────────
# BeatBird Profile Template
#
# Every BeatBird speaker is described by exactly one profile file. Copy this
# template, fill in the values for your specific speaker, and activate it with
#   make profile PROFILE=<name>
#
# Secrets (WiFi PSK, MQTT password) do NOT live here — they go into
# /etc/beatbird/{wifi.pass,mqtt.pass} (created from secrets/ during install).
# ─────────────────────────────────────────────────────────────────────────────

identity:
  hostname: beatbird                     # Linux hostname
  friendly_name: "BeatBird Speaker"      # shown in Spotify Connect, HA, etc.
  speaker_id: beatbird_generic           # unique slug used for MQTT unique_ids

platform: pi-zero-2w                     # pi-zero-2w | pi-3b-plus | pi-4 | pi-5

# ─── Soundcard ────────────────────────────────────────────────────────────────
soundcard:
  driver: louder-hat-plus-1x             # louder-hat-plus-2x | louder-hat-plus-1x
                                         # | louder-hat-triple | innomaker-amp-pro
  # Driver-specific options follow — see install/10-soundcard/<driver>.sh for
  # the full list. Typical fields for TAS5825M-based boards:

  # primary_i2c: 0x4c                    # stereo TAS address
  # secondary_i2c: 0x4d                  # sub TAS (only for *-plus-2x / triple)
  # sub_enabled: true
  # sub_crossover_hz: 150
  # sub_digital_volume: 110              # 0..127 (≤110 recommended @ 24V PVDD)
  # analog_gain_db: -3                   # boot-time setting (default 0 is unsafe)

# ─── Audio / DSP ──────────────────────────────────────────────────────────────
audio:
  camilladsp_config: _stub               # file name under config/camilladsp/ minus .yml
  sample_rate: 48000                     # TAS5825M only accepts 48000
  format: S32LE                          # S32LE (TAS5825M) | S16LE | S24LE
  loudness:
    enabled: true
    # Three filters that get boosted at low volume. Tune to taste.
    # max_boost_db is added on top of the base gain defined in the DSP config.
    filters:
      - name: bass_shelf
        max_boost_db: 3.0
      - name: sub_punch
        max_boost_db: 2.0
      - name: timpani_body
        max_boost_db: 1.5

# ─── Display ──────────────────────────────────────────────────────────────────
display:
  type: amoled                           # amoled | led-button | none
  variant: waveshare-1.43                # amoled: waveshare-1.43
  # For AMOLED (serial-attached ESP32):
  serial_device: auto                    # auto | /dev/ttyACM0 | vid:pid 303A:*
  spectrum_bands: 0                      # 0 = use LV: energy ring (default). FFT spectrum is currently blocked by ALSA Loopback sub contention with CamillaDSP — re-enable only after asound.conf dsnoop setup.
  # For led-button (to be implemented):
  # led_pin: 18                          # GPIO pin (BCM numbering)
  # led_count: 12
  # button_pin: 17
  # led_brightness: 128                  # 0..255

# ─── Hardware (optional) ──────────────────────────────────────────────────────
# Power button: long-press triggers `sudo poweroff`. GPIO3 is the canonical
# wake-from-halt pin on BCM283x — same button shuts the Pi down AND turns it
# back on, no boot overlay needed. Short presses are intentionally no-ops.
hardware:
  power_button:
    enabled: false                       # set true if a button is wired
    gpio: 3                              # Pin 5 on the 40-pin header
    long_press_s: 2.0                    # how long to hold for shutdown

# ─── Weather (optional, drives the standby screen) ────────────────────────────
# Bridge polls Open-Meteo every `interval_minutes` and pushes a single WX:
# line to the ESP32. Coordinates are personal data — they live in
# `secrets/location.coords` (one line: "lat,lon"), NOT here in the profile.
# `make secrets` scaffolds an example file. When disabled or when the
# secrets file is missing, standby falls back to clock + heartbeat only.
weather:
  enabled: false
  interval_minutes: 30

# ─── WiFi ─────────────────────────────────────────────────────────────────────
wifi:
  ssid: "your-ssid"
  country: DE
  use_usb_dongle: true                   # true = disable onboard radio, use Realtek USB
  disable_onboard_radio: true
  disable_bluetooth: true                # set false once A2DP is wanted

# ─── Home Assistant / MQTT ────────────────────────────────────────────────────
mqtt:
  enabled: true
  host: 192.168.1.10
  port: 1883
  user: beatbird
  discovery_prefix: homeassistant
  base_topic: beatbird                   # final topic = <base>/<speaker_id>/…

# ─── Audio sources ────────────────────────────────────────────────────────────
sources:
  spotify:
    enabled: true
    device_name: "BeatBird"              # name shown in Spotify Connect
    bitrate: 320                         # 96 | 160 | 320
    normalisation: true
  bluetooth:
    enabled: false                       # requires onboard BT (not on USB-only setups)
    a2dp: true
  toslink:
    enabled: false                       # USB S/PDIF input (TV audio etc.)
    device: "hw:1,0"                     # ALSA device for the SPDIF interface
  snapcast:
    enabled: false
    server: 192.168.1.10
    latency_ms: 30

# ─── Web UI / diagnostics ─────────────────────────────────────────────────────
web:
  enabled: true
  port: 8080                             # FastAPI on http://<hostname>.local:8080
