# Libratone Beat #1 — "BeatsPi"
# Pi Zero 2W · Sonocotta Louder Hat Plus 2X (dual TAS5825M) · Waveshare AMOLED 1.43
# 2.1-way: 2× mid-woofer (stereo) + 5" SB Acoustics SB13PFC25-04-LBR in 4.5L BR

identity:
  hostname: beatpi
  friendly_name: "Beat #1"
  speaker_id: beatpi_speaker

platform: pi-zero-2w

soundcard:
  driver: louder-hat-plus-2x
  primary_i2c: 0x4c                # stereo amp
  secondary_i2c: 0x4d              # sub amp (PBTL)
  sub_enabled: true
  sub_crossover_hz: 150            # TAS5825M internal DSP (sub amp)
  sub_digital_volume: 110          # never exceed ~110 @ 24V PVDD
  analog_gain_db: -3               # safety margin at boot
  # Stereo digital vol / analog gain live in 10-soundcard/louder-hat-plus-2x.sh
  # defaults (stereo_digital_vol: 103, analog_gain: 25/31).

audio:
  camilladsp_config: beat          # config/camilladsp/beat.yml
  sample_rate: 48000
  format: S32_LE
  volume:
    min_db: -60
    max_db: -10
    curve_gamma: 2.0      # Sonos-style audio taper — 50%-slider ≈ 50% perceived loudness
  loudness:
    enabled: false    # RETIRED 2026-06-06 — volume-dependent loudness is now
    # CamillaDSP's NATIVE `Loudness` filter in config/camilladsp/beat.yml (no
    # more bridge PatchConfig loop, no compounding-drift bug). The static base
    # gains stay in beat.yml; the EQ editor tunes them. The curve/filters below
    # are kept only as a record of the old patch-controller voicing.
    curve: smoothstep
    filters:
      - {name: bass_shelf,   max_boost_db: 1.5}
      - {name: sub_punch,    max_boost_db: 1.0}
      - {name: timpani_body, max_boost_db: 0.75}
      - {name: air_lift,     max_boost_db: 2.5}
  # Idle power save: after 10 min quiet, drop BOTH TAS amps (0x4c + 0x4d) into
  # I2C deep-sleep. Proven on the Zipp single chip (4 W → 2 W); the 2X driver
  # sleeps both addresses. Woken on play/touch/volume.
  amp_deep_sleep:
    enabled: true
    timeout_s: 600

display:
  type: amoled
  variant: waveshare-1.43
  serial_device: auto              # VID 303A vendor match
  spectrum_bands: 0      # FFT capture conflicts with CamillaDSP on ALSA Loopback subs; firmware uses LV:-driven energy ring instead
  cover_background:
    enabled: false       # parked: ESP32-S3 too slow for 466×466 JPEG composite — display stutters

  # ── Active accent (current PAL: protocol) ──
  accent_color: "2D6A4F"            # forest mid — primary highlight

  # ── Reserved palette — schema-validated, awaiting protocol/firmware extension ──
  # Design intent (forest / vintage-cap moodboard):
  accent_glow:    "52B788"          # sage glow — bright variant, "now playing" emphasis
  accent_dim:     "1B4332"          # forest deep — unfilled tracks, dim ring segments
  text_primary:   "F4EFE0"          # cream — body text, track title
  text_secondary: "A89E89"          # linen — labels, source line
  accent_alert:   "C73E2C"          # rust stitching — warnings, errors

wifi:
  ssid: "your-ssid"                # override before install
  country: DE
  use_usb_dongle: true             # onboard = Faraday-caged by aluminium body
  disable_onboard_radio: true
  # Onboard BT chip stays disabled (still Faraday-caged), but a USB
  # TP-Link UB500 dongle is plugged in and provides BT independently.
  disable_bluetooth: false

mqtt:
  # Disabled until a real broker exists. With enabled=true and the placeholder
  # host below, the bridge's `mqtt.start()` blocks indefinitely on this Pi —
  # main loop never starts, DSP volume stays at the boot default (0 dB / max),
  # display receives no state. Re-enable once a real broker is up and host is
  # replaced. (Zipp Mini 2 happens not to hang here, root cause still TBD.)
  enabled: false
  host: 192.168.1.10             # adjust
  port: 1883
  user: beatbird
  discovery_prefix: homeassistant
  base_topic: beatpi               # keeps existing HA entity names

sources:
  spotify:
    enabled: true
    device_name: "BeatPi"
    bitrate: 320
    normalisation: true
  bluetooth:
    enabled: true                  # via USB TP-Link UB500 dongle
    a2dp: true
  toslink:
    enabled: false
  snapcast:
    # Source-indicator only — bridge polls the snapserver's TCP control
    # to detect when this client is in a group whose stream is playing,
    # and flips source=SNAPCAST on the display. Audio routing itself is
    # handled by the snapclient.service on the Pi, not by the bridge.
    # Real server IP comes from BEATBIRD_SNAPCAST_SERVER (set by 00-base.sh
    # from secrets/snapcast.host) so the personal address stays out of the
    # public repo.
    enabled: true
    server: 192.168.1.10
    latency_ms: 30

# Weather — coords live in secrets/location.coords (gitignored).
weather:
  enabled: true
  interval_minutes: 30

web:
  enabled: true
  port: 8080

# Standby idle-text source. Local list is always available; RSS headlines
# mixed in if a feed is configured. Empty rss_url = local only.
idle:
  rss_url: ""
  rss_refresh_minutes: 30
  max_chars: 50
  rss_weight: 0.5
