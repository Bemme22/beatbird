# Libratone Lounge — TV soundbar, true stereo
# Pi 5 (1 GB) · 2× Louder Hat Plus 2X + 1× Louder Hat 1X non-Plus = 5 amp channels
# · existing LED + button interface
# 1 GB is plenty: Beat / Zipp Mini 2 run the same stack on 512 MB Zero 2 W.
#
# Drivers per side: 1× 8" woofer (3.2Ω), 2× 4" mids (2.7Ω), 2× ribbon tweeters
# (4.1Ω). No passive crossover — sealed enclosure, full active DSP.
#
# IMPORTANT: Sonocotta's current stock driver only supports 2 DACs at once.
# Running 3 DACs requires a custom device-tree overlay. The soundcard installer
# for this profile is marked as TODO (see install/10-soundcard/louder-hat-triple.sh)

identity:
  hostname: lounge
  friendly_name: "Lounge"
  speaker_id: lounge

platform: pi-5                     # 1 GB variant — Pi 5 RP1 + CPU is the win, not the RAM

soundcard:
  driver: louder-hat-triple
  # Addresses VERIFIED on the bench 2026-05-29 via i2cdetect (not placeholders):
  #   0x4c TAS5825M stereo → Mid L/R      (TDM slots 0,1)
  #   0x4d TAS5825M PBTL   → 8" woofer     (TDM slot  2)
  #   0x2d TAS5805M stereo → Ribbon L/R    (TDM slots 4,5)
  # The ribbon DAC is 0x2d — NOT the 0x2e the old docs assumed.
  primary_i2c:   0x4c
  secondary_i2c: 0x4d
  tertiary_i2c:  0x2d
  # Crossover is NOT internal anymore — TAS chips run flat, all crossover is
  # in CamillaDSP. sub_crossover_hz / sub_digital_volume here are legacy and
  # unused by the flat triple init; left for schema compatibility.
  sub_enabled: true
  sub_crossover_hz: 120
  sub_digital_volume: 110
  # Conservative safe-boot analog gain — matters most for the flat ribbon amp.
  analog_gain_db: -9

audio:
  camilladsp_config: lounge        # config/camilladsp/lounge.yml — 8-ch TDM, all-active
  sample_rate: 48000
  format: S32_LE
  loudness:
    enabled: true
    filters:
      - {name: bass_shelf,   max_boost_db: 3.0}
      - {name: sub_punch,    max_boost_db: 2.0}
      - {name: timpani_body, max_boost_db: 1.5}

display:
  type: led-button
  variant: libratone-lounge
  led_pin: 18
  led_count: 24                    # verify on teardown
  button_pin: 17
  led_brightness: 128
  spectrum_bands: 24

wifi:
  ssid: "your-ssid"
  country: DE
  use_usb_dongle: false            # Pi 5 radio not Faraday-caged (plastic enclosure on the Lounge)
  disable_onboard_radio: false
  disable_bluetooth: false         # Pi 5 has plenty headroom; BT can coexist with WiFi

mqtt:
  enabled: true
  host: 192.168.1.10
  port: 1883
  user: beatbird
  discovery_prefix: homeassistant
  base_topic: beatbird/lounge

sources:
  spotify:
    enabled: true
    device_name: "Lounge"
    bitrate: 320
    normalisation: true
  bluetooth: {enabled: true, a2dp: true}
  toslink:   {enabled: true, device: "hw:1,0"}  # TV audio via USB SPDIF
  snapcast:  {enabled: true, server: 192.168.1.10, latency_ms: 30}

web:
  enabled: true
  port: 8080
