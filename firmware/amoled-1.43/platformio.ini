; BeatBird Display - Waveshare ESP32-S3-Touch-AMOLED-1.43
; PlatformIO Project for Libratone Beat Speaker Control Display

[env:waveshare-s3-amoled]
; pioarduino bundles Arduino-ESP32 3.x + ESP-IDF 5.1 which has quad_mode in
; esp_lcd_panel_io_spi_config_t. The official espressif32 platform resolves to
; Arduino-ESP32 2.x (ESP-IDF 4.4.x) even on platform 6.x, which lacks quad_mode.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32s3box
framework = arduino

; Flash configuration matching Waveshare ESP32-S3-Touch-AMOLED-1.43 wiki
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = default_16MB.csv
; NOTE: qio_opi (OPI PSRAM) blows DRAM in Arduino framework — do NOT add it.
; LVGL draw buffers are explicitly allocated in internal DMA RAM in main.cpp,
; so PSRAM initialisation is not required for correct display operation.

build_type = debug

extra_scripts =
    pre:scripts/fix_toolchain_path.py
    scripts/upload_via_pi.py

; Flash via Raspberry Pi (ESP32 connected to Pi via USB)
upload_protocol = custom


build_flags =
    ; LVGL: explicit include path so lv_conf.h is found even in library compilation
    ; (workaround for GCC __has_include bug, see LVGL lv_conf_internal.h line 75)
    -I${PROJECT_INCLUDE_DIR}
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=2
    ; Arduino-ESP32 3.x: route Serial to USB CDC (not UART)
    -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps =
    lvgl/lvgl@^9.2.2
    bblanchon/ArduinoJson@^7.2.0

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload via USB
upload_speed = 921600
