; =============================================================================
; BeatBird Display — PlatformIO Build Configuration
; Board: Waveshare ESP32-S3-Touch-AMOLED-1.43
;
; Build:  pio run
; Flash:  pio run -t upload          (via Pi over SSH, configured below)
;         pio run -e local-usb -t upload   (when ESP32 is on dev machine)
; Monitor: pio device monitor
; =============================================================================

[env:waveshare-s3-amoled]
; pioarduino bundles Arduino-ESP32 3.x + ESP-IDF 5.1 which is required for
; quad_mode in esp_lcd_panel_io_spi_config_t. Stock espressif32 platform
; resolves to Arduino 2.x and lacks quad_mode.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board    = esp32s3box
framework = arduino

; ─── Flash configuration (Waveshare wiki spec) ──────────────────────────────
board_build.flash_size  = 16MB
board_build.flash_mode  = qio
board_build.f_flash     = 80000000L
board_build.partitions  = default_16MB.csv
; NOTE: do NOT enable qio_opi (OPI PSRAM) in Arduino framework — it blows DRAM.
; LVGL draw buffers go into internal DMA RAM (see hw/display.cpp), so PSRAM
; init is not needed for correct display operation.

build_type = debug

; ─── Build flags ────────────────────────────────────────────────────────────
build_flags =
    ; LVGL config discovery (workaround for GCC __has_include bug; see
    ; lv_conf_internal.h line 75)
    -I${PROJECT_INCLUDE_DIR}
    -DLV_CONF_INCLUDE_SIMPLE
    ; ESP-IDF logging
    -DCORE_DEBUG_LEVEL=2
    ; Route Arduino Serial to USB CDC (not UART0) for boards without a UART chip
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Optimisation — favour speed over size for animation hot paths
    -O2
    ; Warn on shadowed locals and missing returns; helps catch refactor bugs
    -Wshadow
    ; Departure Mono pixel font (Nothing-Glyph aesthetic). Uncomment AFTER
    ; running `python3 fonts/build.py` once to generate the .c font files.
    ; Without this flag the firmware silently falls back to Montserrat so
    ; the build always works.
    -DHAS_DEPARTURE_MONO=1

; ─── Libraries ──────────────────────────────────────────────────────────────
; Removed: ArduinoJson (no longer used since v3 switched to pipe protocol)
lib_deps =
    lvgl/lvgl@^9.2.2

; ─── Monitor ────────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ─── Upload via Pi (default — when ESP32 is wired to the Pi) ────────────────
upload_protocol = custom
upload_speed    = 921600
extra_scripts =
    pre:scripts/fix_toolchain_path.py
    scripts/upload_via_pi.py


; ─── Alternative: local USB flash ───────────────────────────────────────────
; Use when the ESP32 is plugged directly into the development machine.
;   pio run -e local-usb -t upload
[env:local-usb]
extends = env:waveshare-s3-amoled
upload_protocol = esptool
extra_scripts =
    pre:scripts/fix_toolchain_path.py


; ─── Per-speaker rotation overrides ─────────────────────────────────────────
; Beat #1 has the display mounted in landscape — disable the +90° MADCTL
; rotation and the corresponding touch-coord swap.
;   pio run -e beat -t upload
[env:beat]
extends = env:waveshare-s3-amoled
build_flags =
    ${env:waveshare-s3-amoled.build_flags}
    -DDISPLAY_ROTATE_90=0
