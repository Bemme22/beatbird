; =============================================================================
; BeatBird Display — PlatformIO Build Configuration
; Board: Waveshare ESP32-S3-Touch-AMOLED-1.43
;
; Each [env:<name>] matches a speaker profile (profiles/<name>.yml). Flash
; with the env that matches the speaker:
;
;   pio run -e zipp-mini-2 -t upload     ; Zipp Mini 2 (panel rotated 90°)
;   pio run -e beat-1      -t upload     ; Beat #1     (panel NATIVE orientation)
;   pio run -e beat-2      -t upload     ; Beat #2     (same as Beat #1)
;   pio run -e zipp-2      -t upload     ; Zipp 2      (same as Zipp Mini 2)
;
; Utility env for ESP32 plugged directly into the dev machine:
;   pio run -e local-usb -t upload
;
; Desktop simulator (LVGL + SDL2 on Linux):
;   pio run -e sim && .pio/build/sim/program
;
; Monitor: pio device monitor
; =============================================================================


; ─── Shared defaults — ALL envs inherit (ESP32 + sim) ───────────────────────
; Keep this minimal: only stuff that's meaningful in BOTH the ESP32 build
; and the native sim. ESP32-only stuff (platform, board, framework, …) goes
; into [esp32_base] below, which only ESP32 envs `extends =`.
[env]
build_type = debug
lib_deps =
    lvgl/lvgl@^9.2.2


; ─── ESP32 base — pioarduino + Waveshare AMOLED 1.43 settings ───────────────
; pioarduino bundles Arduino-ESP32 3.x + ESP-IDF 5.1 which is required for
; quad_mode in esp_lcd_panel_io_spi_config_t. Stock espressif32 platform
; resolves to Arduino 2.x and lacks quad_mode.
[esp32_base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board    = esp32s3box
framework = arduino

; Flash configuration (Waveshare wiki spec)
board_build.flash_size  = 16MB
board_build.flash_mode  = qio
board_build.f_flash     = 80000000L
board_build.partitions  = default_16MB.csv
; NOTE: do NOT enable qio_opi (OPI PSRAM) in Arduino framework — it blows DRAM.

build_flags =
    ; LVGL config discovery (workaround for GCC __has_include bug)
    -I${PROJECT_INCLUDE_DIR}
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=2
    ; Route Arduino Serial to USB CDC (not UART0) for boards without a UART chip
    -DARDUINO_USB_CDC_ON_BOOT=1
    -O2
    -Wshadow
    ; Departure Mono pixel font (legacy Nothing-Glyph aesthetic — fallback).
    -DHAS_DEPARTURE_MONO=1
    ; Inter grotesk ("Warm Funktional" language). Preferred when set; see theme.h.
    -DHAS_INTER=1
    ; Weather Icons font (standby weather glyphs).
    -DHAS_WEATHER_ICONS=1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ESP32 builds compile everything EXCEPT the desktop simulator entrypoint.
build_src_filter =
    +<*>
    -<sim/>

; Upload via Pi by default. The local-usb env overrides this for direct flashing.
upload_protocol = custom
upload_speed    = 921600
extra_scripts =
    pre:scripts/fix_toolchain_path.py
    pre:scripts/embed_version.py
    scripts/upload_via_pi.py


; ─── Speaker envs ───────────────────────────────────────────────────────────
;
; History of MADCTL probing on Beat (all visibly wrong before NATIVE was tried):
;   rot0   (0x00) → content 90° CW  (text vertical, stripes top+right)
;   rot90  (0xA0) → content 90°     (Zipp default; Beat-original symptom)
;   rot180 (0xC0) → content 180°    (text upside-down, stripes left+bottom)
;   rot270 (0x60) → also wrong
; → The panel default (no 0x36 sent) gives the correct mounting orientation
;   for Beat. The panel ships with a column/row gap that any non-default
;   MADCTL setting shifts off-screen — see firmware/.../src/main.cpp.

[env:zipp-mini-2]
extends = esp32_base
; Default rotation (DISPLAY_ROTATE_DEG=90 in main.cpp) matches Zipp Mini 2's
; mounting — MADCTL=0xA0. No extra build_flags needed.
custom_pi_host = Zipp2miniPi

[env:zipp-2]
extends = env:zipp-mini-2
; Identical panel mounting to Zipp Mini 2 so far. Override here if Zipp 2
; ever needs a different rotation/palette.
; TODO: set the real ssh hostname once Zipp 2 hardware exists. Until then,
; this env inherits Zipp Mini 2's host — flashing it would flash the wrong
; speaker, so the upload script will refuse if you leave a stale value here.
custom_pi_host =

[env:beat-1]
extends = esp32_base
build_flags =
    ${esp32_base.build_flags}
    -DDISPLAY_ROTATE_NATIVE=1
custom_pi_host = BeatPiSpeaker

[env:beat-2]
extends = env:beat-1
; Same panel orientation as Beat #1. Override here if Beat #2 differs.
; TODO: set the real ssh hostname once Beat #2 hardware exists. See note on
; [env:zipp-2] — empty here so we don't silently flash Beat #1.
custom_pi_host =


; ─── Utility envs ───────────────────────────────────────────────────────────

; Local USB flash — when the ESP32 is plugged directly into the dev machine.
;   pio run -e local-usb -t upload
[env:local-usb]
extends = esp32_base
upload_protocol = esptool
extra_scripts =
    pre:scripts/fix_toolchain_path.py
    pre:scripts/embed_version.py


; ─── Desktop simulator (LVGL + SDL2 on Linux) ───────────────────────────────
; Builds the UI code natively against LVGL's SDL backend so we can iterate
; on screens / animations / colours without a 30-second flash cycle. The
; ESP32-only files (main.cpp, sh8601/) are filtered out; their roles are
; replaced by src/sim/sim_main.cpp which sets up SDL, builds the screens,
; and feeds them protocol input.
;
;   sudo apt install libsdl2-dev
;   pio run -e sim
;   .pio/build/sim/program
;
; This env deliberately does NOT extend esp32_base — that's the whole point
; of moving the ESP32 settings out of [env]. It only inherits [env]'s
; build_type + lib_deps (lvgl).
[env:sim]
platform     = native
build_src_filter =
    +<*>
    -<main.cpp>
    -<sh8601/>
build_flags =
    -I${PROJECT_INCLUDE_DIR}
    -I${PROJECT_SRC_DIR}
    -I/usr/include/SDL2
    -DBEATBIRD_SIM=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DHAS_DEPARTURE_MONO=1
    -DHAS_INTER=1
    -DHAS_WEATHER_ICONS=1
    -std=c++17
    -O0 -g
    -Wno-unused-parameter
    -Wno-sign-compare
    -D_REENTRANT
    -lSDL2 -lm -lpthread
lib_ldf_mode = chain+
