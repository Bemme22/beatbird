---
# PRODUCTION CONFIG — Zipp Mini 2 (LTH200)
# Drivers: Orchid 3" broadband (Ch0) + Daisy 1" tweeter (Ch1)
# Crossover: LR4 @ 4 kHz, tweeter_trim -5 dB INVERTED, +bass push for PRs
# REW-tuned 2026-05-16
devices:
  samplerate: 48000
  chunksize: 1024
  capture_samplerate: 44100
  resampler:
    type: Synchronous
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:LouderRaspberry,0"
    format: S32_LE
mixers:
  mono_sum:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - {channel: 0, gain: -8}
          - {channel: 1, gain: -8}
      - dest: 1
        sources:
          - {channel: 0, gain: -8}
          - {channel: 1, gain: -8}
filters:
  bass_static:
    type: Biquad
    parameters: {type: Lowshelf, freq: 100, gain: 6, q: 0.7}
  pr_boost:
    type: Biquad
    parameters: {type: Peaking, freq: 60, gain: 3, q: 1.5}
  bass_shelf:
    type: Biquad
    parameters: {type: Lowshelf, freq: 120, gain: 4, q: 0.7}
  timpani_body:
    type: Biquad
    parameters: {type: Peaking, freq: 80, gain: 2, q: 1.0}
  rew_7k_notch:
    type: Biquad
    parameters: {type: Peaking, freq: 7000, gain: -4.0, q: 3.0}
  xover_lp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyLowpass, freq: 4000, order: 4}
  xover_hp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyHighpass, freq: 4000, order: 4}
  tweeter_trim:
    type: Gain
    parameters:
      gain: -5.0
      inverted: true
  sub_protect:
    type: BiquadCombo
    parameters: {type: ButterworthHighpass, freq: 35, order: 4}
  # Soft limiter on the broadband driver. Aggressive loudness compensation
  # adds up to ~13 dB of boost in the bass path at low volumes; at high
  # volumes a track with already-hot bass peaks would clip without this.
  # Threshold at -1 dBFS leaves a touch of headroom. NOTE: CamillaDSP's
  # Limiter is an INSTANTANEOUS soft-clipper (clip_limit + soft_clip only) —
  # it has no attack/release (that's the Compressor). soft_clip rounds the
  # knee so hot transients distort gracefully instead of hard-clipping.
  broadband_limiter:
    type: Limiter
    parameters:
      clip_limit: -1.0
      soft_clip: true
pipeline:
  - type: Mixer
    name: mono_sum
  - type: Filter
    channels: [0]
    names: [bass_static, pr_boost, bass_shelf, timpani_body, sub_protect, xover_lp, broadband_limiter]
  - type: Filter
    channels: [1]
    names: [xover_hp, tweeter_trim, rew_7k_notch]
