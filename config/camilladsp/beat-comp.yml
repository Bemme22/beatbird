# CamillaDSP config — Libratone Beat, SIGNAL-ADAPTIVE A/B variant (Variante A).
#
# Purpose: A/B a gentle broadband Compressor on top of the production beat.yml —
# the "pro" signal-adaptive dynamics path (what Sonos/Audyssey-class gear does:
# follow the signal continuously, transparently), as opposed to metadata/genre
# switching. Hot-swap to this via web Settings → DSP config switcher.
#
# Identical to beat.yml (native loudness + static EQ + REW + limiter) EXCEPT a
# Compressor sits AFTER the EQ/loudness chain and BEFORE the safety limiter:
#       EQ + loudness  →  Compressor (dynamics)  →  broadband_limiter
# Gentle by design (the pro lesson: too much = pumping/squash). Tune by ear:
#   threshold/factor   = how much / how hard it grabs the loud parts
#   attack/release     = how fast it reacts / recovers (slow release = smooth)
#   makeup_gain        = level back up so quiet detail comes forward
# If it earns its keep, fold the processor into production beat.yml.
---
devices:
  samplerate: 48000
  chunksize: 1024
  capture_samplerate: 44100
  resampler:
    type: Synchronous
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:LouderRaspberry,0"
    format: S32_LE

filters:
  loudness:
    type: Loudness
    parameters:
      fader: Main
      reference_level: -20.0
      low_boost: 4.0
      high_boost: 2.5
      attenuate_mid: false
  bass_shelf:
    type: Biquad
    parameters: {type: Lowshelf, freq: 120, gain: 6, q: 0.6}
  sub_punch:
    type: Biquad
    parameters: {type: Peaking, freq: 45, gain: 3, q: 0.7}
  timpani_body:
    type: Biquad
    parameters: {type: Peaking, freq: 70, gain: 2, q: 1.0}
  fullness:
    type: Biquad
    parameters: {type: Peaking, freq: 200, gain: 3, q: 1.0}
  air_lift:
    type: Biquad
    parameters: {type: Highshelf, freq: 8000, gain: 0, q: 0.7}
  rew_600:
    type: Biquad
    parameters: {type: Peaking, freq: 600,   gain: -5.7, q: 2.431}
  rew_2269:
    type: Biquad
    parameters: {type: Peaking, freq: 2269,  gain: -6.1, q: 5.0}
  rew_9886:
    type: Biquad
    parameters: {type: Peaking, freq: 9886,  gain: -4.9, q: 4.093}
  rew_14025:
    type: Biquad
    parameters: {type: Peaking, freq: 14025, gain: -10.6, q: 4.125}
  sub_protect:
    type: BiquadCombo
    parameters: {type: ButterworthHighpass, freq: 35, order: 6}
  broadband_limiter:
    type: Limiter
    parameters: {clip_limit: -1.0, soft_clip: true}

processors:
  # ─── Signal-adaptive dynamics (the A/B subject) ────────────────────────────
  # Broadband compressor: continuously evens the dynamics — quiet detail comes
  # forward, loud peaks are tamed — so different tracks/passages sit at a more
  # consistent perceived loudness without reaching for the volume. Validated
  # against CamillaDSP 4.1.2. Conservative starting point; tune by ear.
  dynamics:
    type: Compressor
    parameters:
      channels: 2
      monitor_channels: [0, 1]   # level detector watches both channels
      process_channels: [0, 1]   # gain applied to both
      attack: 0.025              # s — lets transients through (natural)
      release: 1.0               # s — slow, smooth, no pumping
      threshold: -28.0           # dB — where compression starts
      factor: 2.5                # ratio 2.5:1 (gentle)
      makeup_gain: 3.0           # dB — bring the level back up
      soft_clip: false

pipeline:
  # EQ + loudness (no limiter yet)
  - type: Filter
    channels: [0]
    names: [loudness, bass_shelf, sub_punch, timpani_body, fullness, air_lift,
            rew_600, rew_2269, rew_9886, rew_14025, sub_protect]
  - type: Filter
    channels: [1]
    names: [loudness, bass_shelf, sub_punch, timpani_body, fullness, air_lift,
            rew_600, rew_2269, rew_9886, rew_14025, sub_protect]
  # signal-adaptive dynamics
  - type: Processor
    name: dynamics
  # safety limiter LAST (catches any post-makeup peaks)
  - type: Filter
    channels: [0]
    names: [broadband_limiter]
  - type: Filter
    channels: [1]
    names: [broadband_limiter]
