# CamillaDSP — LT300 (Zipp Gen 1)
# WICHTIG: Channel-Mapping ist anders als beim Beat/Zipp Mini 2!
#   Ch0 = 2× Ribbon parallel (~3Ω) — L  (gleiche Ribbons wie Lounge)
#   Ch1 = Libratone LBR-D002-04 4" Tieftöner (~4Ω) — R
# 360° opponente Ribbons — nach REW-Tuning Polarität A/B testen.
---
devices:
  samplerate: 48000
  chunksize: 1024
  capture_samplerate: 44100
  resampler:
    type: Synchronous
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:LouderRaspberry,0"
    format: S32_LE

mixers:
  mono_sum:
    channels: {in: 2, out: 2}
    mapping:
      - dest: 0
        sources:
          - {channel: 0, gain: -6}
          - {channel: 1, gain: -6}
      - dest: 1
        sources:
          - {channel: 0, gain: -6}
          - {channel: 1, gain: -6}

filters:
  bass_shelf:
    type: Biquad
    parameters: {type: Lowshelf, freq: 120, gain: 4, q: 0.7}
  timpani_body:
    type: Biquad
    parameters: {type: Peaking, freq: 80, gain: 2, q: 1.0}
  xover_lp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyLowpass, freq: 3000, order: 4}
  xover_hp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyHighpass, freq: 3000, order: 4}
  tweeter_trim:
    type: Gain
    parameters: {gain: -9.0, inverted: false}
  sub_protect:
    type: BiquadCombo
    parameters: {type: ButterworthHighpass, freq: 60, order: 4}

pipeline:
  - type: Mixer
    name: mono_sum
  - type: Filter
    channels: [0]
    names: [xover_hp, tweeter_trim]
  - type: Filter
    channels: [1]
    names: [bass_shelf, timpani_body, sub_protect, xover_lp]
