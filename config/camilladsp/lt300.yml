# CamillaDSP — LT300 (Zipp Gen 1)
# Ch0 = Libratone LBR-D002-04 4" (~4Ω)
# Ch1 = 2× Ribbon parallel (~3Ω) — Transformatoren im Tweeter
# Startwerte vor REW. Nach Messung: Polarität der Ribbons A/B testen
# (360° opponente Tweeter — Listening-Optimum ≠ Mess-Optimum).
---
devices:
  samplerate: 48000
  chunksize: 1024
  capture_samplerate: 44100
  resampler:
    type: Synchronous
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:LouderRaspberry,0"
    format: S32_LE

mixers:
  mono_sum:
    channels: {in: 2, out: 2}
    mapping:
      - dest: 0
        sources:
          - {channel: 0, gain: -6}
          - {channel: 1, gain: -6}
      - dest: 1
        sources:
          - {channel: 0, gain: -6}
          - {channel: 1, gain: -6}

filters:
  # Loudness / Tonalität (Bridge patcht zur Laufzeit)
  bass_shelf:
    type: Biquad
    parameters: {type: Lowshelf, freq: 120, gain: 4, q: 0.7}
  timpani_body:
    type: Biquad
    parameters: {type: Peaking, freq: 80, gain: 2, q: 1.0}

  # Crossover
  xover_lp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyLowpass, freq: 3000, order: 4}
  xover_hp:
    type: BiquadCombo
    parameters: {type: LinkwitzRileyHighpass, freq: 3000, order: 4}

  # Ribbon-Trim — konservativ, weil 2× parallel mit Trafo unklar wirkt
  tweeter_trim:
    type: Gain
    parameters:
      gain: -6.0
      inverted: false              # nach REW evtl. auf true (Polaritätstest)

  # Subsonic — Zipp ist sealed/PR, 4" kann nicht tief. Konservativ.
  sub_protect:
    type: BiquadCombo
    parameters: {type: ButterworthHighpass, freq: 50, order: 4}

pipeline:
  - type: Mixer
    name: mono_sum
  - type: Filter
    channels: [0]
    names: [bass_shelf, timpani_body, sub_protect, xover_lp]
  - type: Filter
    channels: [1]
    names: [xover_hp, tweeter_trim]