# CamillaDSP config — Libratone Beat (#1 and #2 until #2 gets measured).
# REW-tuned on Beat #1, 2025-04 with UMIK-1 at 50 cm, 0° calibration.
# rew_2269 re-tuned 2026-05-18 (live -6.1 dB, was -4.0 dB).
# Bass-stack moderated 2026-05-19: bass_shelf 10→6, sub_punch 5→3,
# timpani_body 3→2. Previous values were boombox-tune; new values give a
# warmer-but-not-deftig low end on the Plus 2X stack.
#
# Pipeline: 2-ch loopback capture → EQ/loudness filter chain → 2-ch playback
# to hw:LouderRaspberry,0. The sub channel on Plus 2X is handled entirely by
# the TAS5825M's internal DSP crossover (150 Hz, set by louder-hat-init).
#
# Living values are mirrored in the loudness section so the bridge can patch
# the filter gains at runtime via CamillaDSP's PatchConfig websocket API.
#
# 2026-06-06: folded in the signal-adaptive Compressor (was the beat-comp.yml
# A/B variant) — ear-validated as the production sound ("comp klingt am besten,
# da kommt Fülle mit"). See the processors: block below.
---
devices:
  samplerate: 48000
  chunksize: 1024
  capture_samplerate: 44100
  resampler:
    type: Synchronous
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "hw:LouderRaspberry,0"
    format: S32_LE

filters:
  # ─── Native volume-dependent loudness (replaces the bridge patch-controller) ─
  # CamillaDSP's own Loudness processor lifts a LOW shelf (<70 Hz) + a HIGH shelf
  # (>3.5 kHz) as the Main fader drops below reference_level (ISO-226 style).
  # Promoted from the ear-validated beat-loud.yml A/B. The bridge no longer
  # patches gains per volume — beat-1.yml has audio.loudness.enabled: false.
  loudness:
    type: Loudness
    parameters:
      fader: Main
      reference_level: -20.0   # Main dB at/above which boost = 0
      low_boost: 4.0           # max <70 Hz lift at low volume
      high_boost: 2.5          # max >3.5 kHz lift (≈ the old air_lift)
      attenuate_mid: false
  # ─── Static tonality (hand-tuned base gains — NOT patched per volume now) ────
  bass_shelf:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 120
      gain: 6
      q: 0.6
  sub_punch:
    type: Biquad
    parameters:
      type: Peaking
      freq: 45
      gain: 3
      q: 0.7
  timpani_body:
    type: Biquad
    parameters:
      type: Peaking
      freq: 70
      gain: 2
      q: 1.0
  fullness:
    type: Biquad
    parameters:
      type: Peaking
      freq: 200
      gain: 3
      q: 1.0
  # Air shelf — closes the loudness loop on the treble side. Base gain
  # stays at 0; the bridge's loudness controller patches in +X dB at low
  # volumes via the profile's loudness.filters[air_lift] entry, matching
  # the Fletcher-Munson upper-end curve.
  air_lift:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 8000
      gain: 0
      q: 0.7

  # ─── REW-derived room/driver correction ────────────────────────────────────
  rew_600:
    type: Biquad
    parameters: {type: Peaking, freq: 600,   gain: -5.7, q: 2.431}
  rew_2269:
    type: Biquad
    parameters: {type: Peaking, freq: 2269,  gain: -6.1, q: 5.0}
  rew_9886:
    type: Biquad
    parameters: {type: Peaking, freq: 9886,  gain: -4.9, q: 4.093}
  rew_14025:
    type: Biquad
    parameters: {type: Peaking, freq: 14025, gain: -10.6, q: 4.125}

  # ─── Subsonic protection ───────────────────────────────────────────────────
  sub_protect:
    type: BiquadCombo
    parameters:
      type: ButterworthHighpass
      freq: 35
      order: 6

  # ─── Output limiter (safety net) ──────────────────────────────────────────
  # With +6 dB bass_shelf and the +3 dB loudness boost on top, hot-mastered
  # tracks can clip the stereo path at high volumes. The CamillaDSP Limiter is
  # an instantaneous soft-clipper (no attack/release) — soft_clip at -1 dBFS
  # rounds the knee so peaks distort gracefully instead of hard-clipping.
  broadband_limiter:
    type: Limiter
    parameters:
      clip_limit: -1.0
      soft_clip: true

processors:
  # ─── Signal-adaptive dynamics ──────────────────────────────────────────────
  # Promoted from the beat-comp.yml A/B (2026-06-06, ear-validated — "comp
  # klingt am besten, da kommt Fülle mit"). A gentle broadband compressor sits
  # AFTER the EQ/loudness chain and BEFORE the safety limiter:
  #       EQ + loudness  →  Compressor (dynamics)  →  broadband_limiter
  # It continuously evens the dynamics so quiet detail comes forward and loud
  # peaks are tamed → tracks/passages sit at a more consistent perceived
  # loudness without reaching for the volume. Conservative by design (too much
  # = pumping/squash). Validated against CamillaDSP 4.1.2.
  dynamics:
    type: Compressor
    parameters:
      channels: 2
      monitor_channels: [0, 1]   # level detector watches both channels
      process_channels: [0, 1]   # gain applied to both
      attack: 0.025              # s — lets transients through (natural)
      release: 1.0               # s — slow, smooth, no pumping
      threshold: -28.0           # dB — where compression starts
      factor: 2.5                # ratio 2.5:1 (gentle)
      makeup_gain: 3.0           # dB — bring the level back up
      soft_clip: false

pipeline:
  # EQ + loudness (no limiter yet)
  - type: Filter
    channels: [0]
    names: [loudness, bass_shelf, sub_punch, timpani_body, fullness, air_lift,
            rew_600, rew_2269, rew_9886, rew_14025, sub_protect]
  - type: Filter
    channels: [1]
    names: [loudness, bass_shelf, sub_punch, timpani_body, fullness, air_lift,
            rew_600, rew_2269, rew_9886, rew_14025, sub_protect]
  # signal-adaptive dynamics
  - type: Processor
    name: dynamics
  # safety limiter LAST (catches any post-makeup peaks)
  - type: Filter
    channels: [0]
    names: [broadband_limiter]
  - type: Filter
    channels: [1]
    names: [broadband_limiter]
