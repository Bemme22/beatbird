# /etc/asound.conf — installed by install/10-soundcard.sh
#
# Defines `beatbird_mix`, an ALSA virtual PCM that lets multiple
# writers (go-librespot, SFX aplay) coexist on the playback side of
# ALSA Loopback. CamillaDSP reads the mixed output from the capture
# side of Loopback (hw:Loopback,1,0) as before — that part of the
# pipeline is unchanged.
#
# Why we need this:
#  * go-librespot used to open hw:Loopback,0 directly and held it
#    exclusively. A second writer (our SFX aplay) couldn't open the
#    same device → SFX was silent whenever music was playing.
#  * Loopback's playback side accepts only S32_LE at the CamillaDSP-
#    configured rate. Our SFX WAVs are 16-bit mono 44.1 kHz, so we
#    need a format / rate / channel conversion step anyway.
#
# Structure:
#  - outer `plug` wraps the dmix with on-the-fly format/rate/channel
#    conversion so clients don't have to match the slave spec.
#  - `dmix` provides multi-writer mixing into a single underlying
#    stream.
#  - the dmix slave is the raw hw:Loopback,0,0 with the exact format
#    the kernel module accepts.
#
# Both go-librespot and the SFX aplay are configured to target
# `beatbird_mix` — they appear to ALSA as independent clients of the
# same dmix, which is exactly what we want.

pcm.beatbird_mix {
    type plug
    slave.pcm {
        type dmix
        # Shared System V IPC key — any client that targets this PCM
        # joins the same dmix instance. Arbitrary number; just needs
        # to be consistent and unique on the box.
        ipc_key 4242
        ipc_perm 0666
        slave {
            pcm "hw:Loopback,0,0"
            format S32_LE
            # 44100, NOT 48000. The ALSA loopback (aloop) does not resample —
            # both ends of the cable must run the same rate. CamillaDSP captures
            # hw:Loopback,1 at capture_samplerate 44100 and is the persistent
            # first-opener, so it pins the cable at 44100; a 48000 here was
            # silently forced down to 44100 anyway (verified live 2026-06-04:
            # pcm0p + pcm1c both 44100 during playback). Stating 44100 keeps the
            # config honest and avoids a rate clash if dmix ever opens first
            # (e.g. a camilladsp restart mid-stream → cable 48000 → CamillaDSP
            # can't capture at 44100). The outer `plug` still resamples any
            # source rate up/down to this 44100. (CamillaDSP then resamples
            # 44100→48000 Synchronous for the amp, which runs 48k.)
            rate 44100
            channels 2
            period_size 1024
            buffer_size 8192
        }
    }
}
